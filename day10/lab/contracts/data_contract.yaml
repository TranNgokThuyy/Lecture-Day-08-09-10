version: "1.0"
dataset: "kb_chunk_export"
owner_team: "PLACEHOLDER_GROUP"

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "Stable chunk id generated from doc_id, text, and sequence."
  doc_id:
    type: string
    required: true
    description: "Canonical document identifier."
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
  effective_date:
    type: date
    required: true
  exported_at:
    type: datetime
    required: true

quality_rules:
  - id: "allowed_doc_ids_only"
    severity: "halt"
  - id: "no_duplicate_chunk_text"
    severity: "warn"
  - id: "no_stale_refund_window"
    description: "Refund policy v4 must publish 7 business days, not stale 14 business days."
    severity: "halt"
  - id: "no_stale_hr_2025_content"
    description: "HR 2025 annual leave chunks with 10 annual leave days must not be published."
    severity: "halt"
  - id: "exported_at_parseable_iso"
    description: "Export timestamp must be ISO parseable for freshness and lineage."
    severity: "halt"

freshness:
  measured_at: "publish"
  sla_hours: 24
  alert_channel: "PLACEHOLDER_ALERT_CHANNEL"

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
    owner: "CS Policy"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
    owner: "Incident Ops"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
    owner: "IT Helpdesk"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"
    owner: "HR Operations"
  - path: "data/docs/access_control_sop.txt"
    doc_id: "access_control_sop"
    owner: "IT Security"

allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy
  - access_control_sop

policy_versioning:
  hr_leave_min_effective_date: "2026-01-01"
  refund_policy_current_window: "7 business days"
